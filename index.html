<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Chat Pro | Auto-Sync P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .accent-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .pulse { animation: pulse-ring 1.5s cubic-bezier(0.24, 0, 0.38, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .message-in { animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4">

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="w-full max-w-lg glass p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/20 blur-3xl rounded-full"></div>
        
        <div class="text-center mb-8">
            <h1 class="text-5xl font-extrabold tracking-tight mb-2">Connect<span class="text-indigo-400">Chat</span></h1>
            <p class="text-slate-400">Instant P2P. No Copy-Paste required.</p>
        </div>

        <div id="initial-step" class="space-y-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Your Identity</label>
                <input type="text" id="username-input" placeholder="Enter nickname..." class="w-full bg-transparent text-xl font-bold focus:outline-none placeholder:text-slate-600">
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Invite Key (Share this with your friend)</label>
                <input type="text" id="custom-room-id" placeholder="e.g. secret-room-99" class="w-full bg-transparent text-lg font-bold focus:outline-none placeholder:text-slate-600 uppercase">
                <p class="text-[10px] text-slate-500 mt-2 italic">If both people use the same key, you'll connect automatically.</p>
            </div>
            <button onclick="startConnection()" id="connect-btn" class="w-full py-4 accent-gradient rounded-2xl font-bold text-white shadow-lg hover:brightness-110 transition-all">
                Connect Now
            </button>
        </div>

        <!-- Connection Status Overlay -->
        <div id="connecting-overlay" class="hidden flex flex-col items-center justify-center py-12 space-y-6">
            <div class="relative">
                <div class="absolute inset-0 rounded-full bg-indigo-500 pulse"></div>
                <div class="relative w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-white animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
            </div>
            <div class="text-center">
                <h3 class="text-xl font-bold text-white" id="status-text">Searching for peer...</h3>
                <p class="text-slate-400 text-sm mt-1">Room: <span id="status-room" class="text-indigo-400 font-mono"></span></p>
            </div>
            <button onclick="location.reload()" class="text-xs text-slate-500 hover:text-white underline">Cancel</button>
        </div>
    </div>

    <!-- CHAT INTERFACE -->
    <div id="chat-screen" class="hidden w-full max-w-5xl h-[90vh] glass flex flex-col shadow-2xl relative overflow-hidden">
        <!-- Header -->
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div id="peer-avatar" class="w-12 h-12 rounded-2xl accent-gradient flex items-center justify-center font-bold text-xl uppercase">?</div>
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-4 border-slate-900 rounded-full"></div>
                </div>
                <div>
                    <h2 id="peer-name" class="font-bold text-lg text-white">Friend</h2>
                    <div class="text-xs text-slate-500 flex items-center gap-1">
                        <span id="room-label" class="bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded text-[10px] font-bold mr-2 uppercase"></span>
                        Direct P2P Tunnel
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="p-3 hover:bg-white/5 rounded-xl text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>

        <!-- Message List -->
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar"></div>

        <!-- Input Area -->
        <div class="p-6 border-t border-white/5 bg-black/10">
            <form id="chat-form" class="flex items-center gap-4">
                <label class="cursor-pointer p-3 hover:bg-white/5 rounded-2xl text-slate-400">
                    <input type="file" id="file-input" class="hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </label>
                <input type="text" id="message-input" autocomplete="off" placeholder="Write a message..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 ring-indigo-500/50">
                <button type="submit" class="accent-gradient p-4 rounded-2xl text-white shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- WebRTC & Signaling Config ---
        const iceServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(iceServers);
        let dataChannel = null;
        let myName = "";
        let myRoomId = "";
        let peerName = "Friend";
        
        // We use a public websocket relay for the handshake ONLY. 
        // Once connected, the relay is ignored and communication is pure P2P.
        let socket;

        async function startConnection() {
            myName = document.getElementById('username-input').value.trim() || "User-" + Math.floor(Math.random() * 99);
            myRoomId = document.getElementById('custom-room-id').value.trim().toUpperCase() || "LOBBY";

            document.getElementById('initial-step').classList.add('hidden');
            document.getElementById('connecting-overlay').classList.remove('hidden');
            document.getElementById('status-room').innerText = myRoomId;

            // Connect to a public signaling relay
            socket = new WebSocket('wss://connect.websocket.me/v3/1?api_key=o7S68sV7968sV7968sV7'); // Public demo key

            socket.onopen = () => {
                // Join the room channel
                socket.send(JSON.stringify({ type: 'join', room: myRoomId }));
                
                // One peer acts as the caller (Host), the other as the answerer.
                // To decide, we wait a moment or just try to offer immediately.
                initiateHandshake();
            };

            socket.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                if (msg.room !== myRoomId || msg.sender === myName) return;

                if (msg.type === 'offer') {
                    peerName = msg.name;
                    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    sendSignal({ type: 'answer', sdp: pc.localDescription, name: myName });
                } else if (msg.type === 'answer') {
                    peerName = msg.name;
                    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                } else if (msg.type === 'candidate') {
                    try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(e) {}
                }
            };
        }

        function sendSignal(data) {
            data.room = myRoomId;
            data.sender = myName;
            socket.send(JSON.stringify(data));
        }

        async function initiateHandshake() {
            // Setup Data Channel
            dataChannel = pc.createDataChannel('chat');
            setupDataHandlers(dataChannel);

            // Setup ICE candidates
            pc.onicecandidate = (e) => {
                if (e.candidate) sendSignal({ type: 'candidate', candidate: e.candidate });
            };

            // Handling incoming channels (for the person who didn't create the offer)
            pc.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataHandlers(dataChannel);
            };

            // Generate Offer
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal({ type: 'offer', sdp: pc.localDescription, name: myName });
        }

        function setupDataHandlers(channel) {
            channel.onopen = () => {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                document.getElementById('peer-name').innerText = peerName;
                document.getElementById('peer-avatar').innerText = peerName[0];
                document.getElementById('room-label').innerText = myRoomId;
                appendStatus(`Direct connection with ${peerName} secured.`);
                // We can close the signaling socket now, we are P2P!
                socket.close();
            };

            channel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'text') appendMessage('peer', data.content);
                if (data.type === 'file') handleFileDownload(data);
            };
        }

        // --- UI Interactions ---
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('message-input');
        const fileInput = document.getElementById('file-input');
        const messagesDiv = document.getElementById('messages');

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (text && dataChannel?.readyState === 'open') {
                dataChannel.send(JSON.stringify({ type: 'text', content: text }));
                appendMessage('me', text);
                msgInput.value = '';
            }
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                dataChannel.send(JSON.stringify({ type: 'file', name: file.name, data: reader.result }));
                appendStatus(`Sent: ${file.name}`);
            };
            reader.readAsDataURL(file);
        };

        function handleFileDownload(file) {
            appendStatus(`${peerName} sent a file.`);
            const link = document.createElement('a');
            link.href = file.data; link.download = file.name;
            link.className = "block mt-2 p-3 bg-white/10 rounded-xl text-xs text-indigo-400 font-bold border border-indigo-500/20";
            link.innerText = `⬇ Download ${file.name}`;
            messagesDiv.appendChild(link);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `flex w-full ${sender === 'me' ? 'justify-end' : 'justify-start'} message-in`;
            div.innerHTML = `
                <div class="max-w-[80%]">
                    <div class="flex items-center gap-2 mb-1 px-2 ${sender === 'me' ? 'flex-row-reverse' : ''}">
                        <span class="text-[9px] font-bold uppercase text-slate-500 tracking-widest">${sender === 'me' ? myName : peerName}</span>
                    </div>
                    <div class="px-5 py-3 rounded-2xl shadow-xl ${
                        sender === 'me' ? 'accent-gradient text-white rounded-tr-none' : 'bg-white/10 text-white rounded-tl-none border border-white/5'
                    }">
                        <p class="text-sm">${escapeHtml(text)}</p>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendStatus(txt) {
            const div = document.createElement('div');
            div.className = "text-center text-[10px] uppercase text-slate-600 font-bold py-2 tracking-widest";
            div.innerText = txt;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
