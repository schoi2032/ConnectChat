<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | P2P Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f7ff;
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Auth / Login Screen -->
    <div id="auth-screen" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 animate-fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">ConnectChat</h1>
            <p class="text-gray-500 mt-2">Enter your details to start chatting</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Display Name</label>
                <input type="text" id="username" placeholder="Your Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Custom ID</label>
                <input type="text" id="peer-id" placeholder="Choose a unique ID (e.g. user123)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>
            <button onclick="initSession()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all transform active:scale-95 shadow-md shadow-blue-100 mt-4">
                Initialize Session
            </button>
        </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="chat-screen" class="hidden w-full max-w-4xl bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden h-[90vh] animate-fade-in">
        <!-- Header -->
        <div class="bg-blue-600 p-4 md:p-6 text-white flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                    <span id="user-initial" class="text-xl font-bold">U</span>
                </div>
                <div>
                    <h2 id="display-name" class="font-bold text-lg leading-tight">...</h2>
                    <p class="text-blue-100 text-xs flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                        My ID: <span id="my-id-display" class="font-mono bg-blue-700 px-1 rounded">...</span>
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="target-id" placeholder="Enter friend's ID" class="bg-blue-700/50 border border-blue-400/30 rounded-lg px-3 py-2 text-sm placeholder-blue-200 outline-none focus:bg-blue-700 transition-all">
                <button onclick="connectToPeer()" class="bg-white text-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-50 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Connect
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="messages-container" class="flex-grow p-6 overflow-y-auto custom-scrollbar space-y-4 bg-slate-50">
            <div class="text-center py-10">
                <p class="text-gray-400 text-sm">Welcome to ConnectChat. Share your ID with friends to start a P2P conversation.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-100">
            <form id="chat-form" onsubmit="sendMessage(event)" class="flex gap-2">
                <input type="text" id="message-input" placeholder="Type a message..." class="flex-grow px-4 py-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all" autocomplete="off">
                <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-all transform active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        let peer;
        let connections = {}; // Track all active peer connections
        let userData = { name: '', id: '' };

        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const messagesContainer = document.getElementById('messages-container');
        const notifSound = document.getElementById('notif-sound');

        /**
         * Initialize PeerJS Session
         */
        function initSession() {
            const name = document.getElementById('username').value.trim();
            const id = document.getElementById('peer-id').value.trim();

            if (!name || !id) {
                alert("Please enter both name and ID.");
                return;
            }

            userData.name = name;
            userData.id = id;

            // Initialize PeerJS
            // No API key needed for public cloud server
            peer = new Peer(id);

            peer.on('open', (id) => {
                console.log('My peer ID is: ' + id);
                document.getElementById('display-name').innerText = userData.name;
                document.getElementById('my-id-display').innerText = id;
                document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
                
                authScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                if (err.type === 'unavailable-id') {
                    alert('This ID is already taken. Please choose another one.');
                } else {
                    alert('PeerJS Error: ' + err.type);
                }
            });
        }

        /**
         * Connect to a specific Peer ID
         */
        function connectToPeer() {
            const targetId = document.getElementById('target-id').value.trim();
            
            if (!targetId) return;
            if (targetId === userData.id) {
                alert("You cannot connect to yourself!");
                return;
            }
            if (connections[targetId]) {
                alert("Already connected to this user.");
                return;
            }

            const conn = peer.connect(targetId);
            setupConnection(conn);
            document.getElementById('target-id').value = '';
        }

        /**
         * Handle connection events and data flow
         */
        function setupConnection(conn) {
            conn.on('open', () => {
                // If this is a new connection, register it
                if (!connections[conn.peer]) {
                    connections[conn.peer] = conn;
                    
                    // Share current peer list to expand the group automatically
                    const peerIds = Object.keys(connections).filter(id => id !== conn.peer);
                    conn.send({
                        type: 'system',
                        action: 'handshake',
                        name: userData.name,
                        existingPeers: peerIds
                    });

                    addSystemMessage(`${conn.peer} joined the conversation.`);
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    renderMessage(data.sender, data.text, false);
                    playSound();
                } else if (data.type === 'system') {
                    handleSystemMessage(data, conn);
                }
            });

            conn.on('close', () => {
                addSystemMessage(`${conn.peer} disconnected.`);
                delete connections[conn.peer];
            });
            
            conn.on('error', () => {
                delete connections[conn.peer];
            });
        }

        /**
         * Handle System Logic (Automatic Group Expansion)
         */
        function handleSystemMessage(data, conn) {
            if (data.action === 'handshake') {
                // If the new peer tells us about other peers, connect to them too
                if (data.existingPeers && data.existingPeers.length > 0) {
                    data.existingPeers.forEach(peerId => {
                        if (peerId !== userData.id && !connections[peerId]) {
                            const newConn = peer.connect(peerId);
                            setupConnection(newConn);
                        }
                    });
                }
            }
        }

        /**
         * Send message to all connected peers
         */
        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text) return;

            const messageObj = {
                type: 'chat',
                sender: userData.name,
                text: text,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            // Broadcast to all peers
            Object.values(connections).forEach(conn => {
                if (conn.open) {
                    conn.send(messageObj);
                }
            });

            renderMessage('You', text, true);
            input.value = '';
        }

        /**
         * UI Rendering Helpers
         */
        function renderMessage(sender, text, isMe) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-1 animate-fade-in`;
            
            msgDiv.innerHTML = `
                <span class="text-xs font-semibold text-gray-500 px-2">${sender}</span>
                <div class="message-bubble px-4 py-2 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-gray-800 shadow-sm border border-gray-100 rounded-tl-none'}">
                    <p class="text-sm">${escapeHTML(text)}</p>
                </div>
                <span class="text-[10px] text-gray-400 px-2">${time}</span>
            `;

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "flex justify-center my-2";
            msgDiv.innerHTML = `<span class="bg-gray-200 text-gray-500 text-[10px] uppercase tracking-widest font-bold px-3 py-1 rounded-full">${text}</span>`;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function playSound() {
            notifSound.currentTime = 0;
            notifSound.play().catch(e => console.log("Audio play blocked by browser. Interaction required."));
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
