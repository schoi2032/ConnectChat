<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | Direct P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for WebRTC Direct Connections -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }

        /* Redesigned Minimalist P2P Logo */
        .logo-box {
            position: relative;
            width: 64px;
            height: 64px;
            background: #0f172a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            animation: wave 2s infinite linear;
        }

        @keyframes wave {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .bubble-me {
            background: #0f172a;
            color: white;
            border-radius: 18px 18px 2px 18px;
            align-self: flex-end;
        }

        .bubble-them {
            background: white;
            color: #1e293b;
            border-radius: 18px 18px 18px 2px;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Status Toast -->
    <div id="toast" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 font-bold text-sm">
        <i class="fas fa-bolt"></i>
        <span id="toast-text">System Ready</span>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center">
            <div class="logo-box mx-auto mb-8 shadow-2xl">
                <div class="logo-wave"></div>
                <i class="fas fa-shield-halved text-white text-2xl relative z-10"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">ConnectChat</h1>
            <p class="text-slate-400 text-sm mb-10 font-medium">True Peer-to-Peer messaging.</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Choose Handle</label>
                    <input type="text" id="name-input" placeholder="e.g. Alice" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-indigo-500 outline-none font-bold transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Public Link ID (Optional)</label>
                    <input type="text" id="room-id-input" placeholder="Custom-ID-123" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-indigo-500 outline-none font-mono text-sm transition-all">
                </div>
                <button id="join-btn" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-black transition-all shadow-lg active:scale-95">
                    Establish Mesh
                </button>
            </div>
        </div>
    </div>

    <!-- App Header -->
    <header class="h-20 bg-white border-b border-slate-100 px-6 lg:px-12 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-network-wired"></i>
            </div>
            <div>
                <h2 class="font-bold text-slate-900 leading-none" id="display-name">Guest</h2>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter" id="peer-status">Offline</span>
            </div>
        </div>

        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl">
            <span class="text-[10px] font-bold text-slate-400">MY ID:</span>
            <code id="my-peer-id" class="text-xs font-black text-indigo-600 font-mono tracking-tight">WAITING...</code>
            <button id="copy-id-btn" class="ml-2 text-slate-300 hover:text-slate-600 transition-colors">
                <i class="fas fa-copy"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Peer Sidebar -->
        <aside class="w-72 border-r border-slate-100 bg-white hidden md:flex flex-col p-6 shrink-0">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Add Connection</label>
            <div class="flex flex-col gap-2 mb-8">
                <input type="text" id="target-id-input" placeholder="Friend's Peer ID" 
                    class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-mono focus:border-indigo-500 outline-none transition-all">
                <button id="connect-btn" class="bg-indigo-600 text-white text-xs font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md shadow-indigo-100">
                    Connect to Peer
                </button>
            </div>

            <div class="flex-1">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Mesh</label>
                    <span id="mesh-count" class="bg-slate-100 text-slate-500 text-[10px] font-black px-2 py-0.5 rounded-md">0</span>
                </div>
                <div id="mesh-list" class="space-y-2">
                    <!-- Dynamic Peers -->
                </div>
            </div>
        </aside>

        <!-- Conversation Space -->
        <section class="flex-1 flex flex-col bg-slate-50/50 relative">
            <div id="chat-window" class="flex-1 overflow-y-auto p-6 lg:p-10 flex flex-col gap-4 custom-scroll">
                <div id="intro-msg" class="my-auto text-center opacity-40">
                    <i class="fas fa-ghost text-4xl mb-4"></i>
                    <p class="text-sm font-medium">No active connections in your mesh.</p>
                    <p class="text-[10px] uppercase font-black mt-2">Share your ID to start chatting</p>
                </div>
            </div>

            <!-- Message Bar -->
            <div class="p-6 bg-white border-t border-slate-100">
                <form id="msg-form" class="max-w-4xl mx-auto flex gap-3">
                    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off"
                        class="flex-1 bg-slate-100 border-none rounded-2xl px-6 py-4 font-medium focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all text-slate-700">
                    <button type="submit" class="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center hover:bg-black transition-all shadow-xl active:scale-90">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        let peer = null;
        let connections = {}; // Active connections indexed by Peer ID
        let userName = "Guest";

        const elements = {
            auth: document.getElementById('auth-screen'),
            joinBtn: document.getElementById('join-btn'),
            nameIn: document.getElementById('name-input'),
            roomIn: document.getElementById('room-id-input'),
            myId: document.getElementById('my-peer-id'),
            targetId: document.getElementById('target-id-input'),
            connectBtn: document.getElementById('connect-btn'),
            chat: document.getElementById('chat-window'),
            msgForm: document.getElementById('msg-form'),
            msgIn: document.getElementById('msg-input'),
            meshList: document.getElementById('mesh-list'),
            meshCount: document.getElementById('mesh-count'),
            intro: document.getElementById('intro-msg'),
            toast: document.getElementById('toast'),
            toastText: document.getElementById('toast-text')
        };

        // UI Helpers
        const notify = (msg) => {
            elements.toastText.innerText = msg;
            elements.toast.classList.add('show');
            setTimeout(() => elements.toast.classList.remove('show'), 3000);
        };

        const addMessage = (sender, text, isMe) => {
            elements.intro.style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 px-2">${sender}</span>
                <div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'} shadow-sm">
                    ${text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]))}
                </div>
            `;
            elements.chat.appendChild(div);
            elements.chat.scrollTop = elements.chat.scrollHeight;
        };

        const updateMeshUI = () => {
            const keys = Object.keys(connections);
            elements.meshCount.innerText = keys.length;
            elements.meshList.innerHTML = keys.map(id => `
                <div class="p-3 bg-white border border-slate-100 rounded-xl flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-[10px] font-bold text-slate-400 shrink-0">
                            ${connections[id].metadata?.name?.charAt(0) || 'P'}
                        </div>
                        <span class="text-xs font-bold text-slate-700 truncate">${connections[id].metadata?.name || 'Peer'}</span>
                    </div>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                </div>
            `).join('');
        };

        // P2P Logic
        const setupConnection = (conn) => {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updateMeshUI();
                notify(`${conn.metadata?.name || 'Peer'} connected`);
            });

            conn.on('data', (data) => {
                addMessage(conn.metadata?.name || "Peer", data, false);
            });

            conn.on('close', () => {
                delete connections[conn.peer];
                updateMeshUI();
                notify("Peer disconnected");
                if(Object.keys(connections).length === 0) elements.intro.style.display = 'block';
            });
        };

        elements.joinBtn.onclick = () => {
            const name = elements.nameIn.value.trim();
            const customId = elements.roomIn.value.trim();
            if (!name) return alert("Enter a name");

            userName = name;
            document.getElementById('display-name').innerText = name;
            elements.auth.style.opacity = '0';
            setTimeout(() => elements.auth.style.display = 'none', 400);

            // Initialize Peer object
            peer = customId ? new Peer(customId) : new Peer();

            peer.on('open', (id) => {
                elements.myId.innerText = id;
                document.getElementById('peer-status').innerText = "Online (Mesh Ready)";
                document.getElementById('peer-status').classList.replace('text-slate-400', 'text-emerald-500');
            });

            // Listen for incoming handshakes
            peer.on('connection', (conn) => {
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                if (err.type === 'unavailable-id') notify("ID already taken");
                else notify("Connection Error");
            });
        };

        elements.connectBtn.onclick = () => {
            const target = elements.targetId.value.trim();
            if (!target || target === peer.id) return;
            if (connections[target]) return notify("Already connected");

            const conn = peer.connect(target, {
                metadata: { name: userName }
            });
            setupConnection(conn);
            elements.targetId.value = '';
        };

        elements.msgForm.onsubmit = (e) => {
            e.preventDefault();
            const msg = elements.msgIn.value.trim();
            if (!msg) return;

            // Broadcast to all peers in the mesh
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(msg);
            });

            addMessage(userName, msg, true);
            elements.msgIn.value = '';
        };

        // Utilities
        document.getElementById('copy-id-btn').onclick = () => {
            const id = elements.myId.innerText;
            if (id === "WAITING...") return;
            navigator.clipboard.writeText(id).then(() => notify("ID Copied!"));
        };
    </script>
</body>
</html>
