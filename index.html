<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | Ultra-Private P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand: #6366f1;
            --brand-light: #a855f7;
            --brand-gradient: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        .logo-mark {
            position: relative;
            width: 64px;
            height: 64px;
            background: #0f172a;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .node-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--brand);
            border-radius: 22px;
            animation: ring-pulse 2s infinite ease-out;
            opacity: 0;
        }

        @keyframes ring-pulse {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble-me {
            background: var(--brand-gradient);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .bubble-them {
            background: white;
            color: #1e293b;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #e2e8f0;
        }

        .radar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--brand);
            animation: radar-ping 2s infinite;
        }

        @keyframes radar-ping {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-slate-50">

    <div id="toast" class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 min-w-[280px]">
        <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-[10px]"><i class="fas fa-signal"></i></div>
        <span id="toast-msg" class="font-bold text-sm">System Ready</span>
    </div>

    <div id="landing" class="fixed inset-0 z-[200] bg-white flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <div class="logo-mark mx-auto mb-8"><div class="node-ring"></div><i class="fas fa-bolt text-indigo-500"></i></div>
            <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900 mb-2">ConnectChat P2P</h1>
            <p class="text-slate-400 font-medium mb-10 text-sm">Purely peer-to-peer. No servers. No logs.</p>
            <div class="space-y-4 text-left">
                <input type="text" id="name-input" placeholder="Your Nickname" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-indigo-500 outline-none font-bold text-lg">
                <button id="start-btn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Launch Connection</button>
            </div>
        </div>
    </div>

    <header class="h-20 bg-white border-b border-slate-100 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center"><i class="fas fa-link text-white text-sm"></i></div>
            <div>
                <h2 class="font-bold text-slate-900 leading-tight" id="header-name">Offline</h2>
                <div class="flex items-center gap-1.5"><span id="status-light" class="w-2 h-2 bg-red-400 rounded-full"></span><span id="status-text" class="text-[9px] font-bold text-slate-400 uppercase">Connecting...</span></div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100">
                <span class="text-[8px] block font-black text-indigo-400 uppercase">Your ID</span>
                <code id="my-id-display" class="text-xs font-bold text-indigo-700">---</code>
            </div>
            <button id="copy-id" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-indigo-600"><i class="fas fa-copy"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6 shrink-0">
            <div class="mb-8">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Connect to Peer</label>
                <div class="flex gap-2">
                    <input type="text" id="target-id" placeholder="Paste ID" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono">
                    <button id="connect-btn" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto" id="peer-list"></div>
        </aside>

        <section class="flex-1 flex flex-col bg-white relative">
            <div id="chat-window" class="flex-1 overflow-y-auto px-6 py-8 space-y-4">
                <div id="radar-container" class="h-full flex flex-col items-center justify-center opacity-50">
                    <div class="radar"><div class="radar-sweep"></div><i class="fas fa-fingerprint text-2xl"></i></div>
                    <p class="text-xs font-bold">Awaiting Peer Connection</p>
                </div>
            </div>
            <footer class="p-4 bg-white border-t">
                <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="chat-input" placeholder="Write a message..." class="flex-1 bg-slate-100 rounded-xl px-4 py-3 outline-none">
                    <button type="submit" class="w-12 h-12 bg-slate-900 text-white rounded-xl"><i class="fas fa-paper-plane"></i></button>
                </form>
            </footer>
        </section>
    </main>

    <script>
        let peer = null;
        let connections = new Map();
        let myName = "User";

        const els = {
            landing: document.getElementById('landing'),
            startBtn: document.getElementById('start-btn'),
            nameIn: document.getElementById('name-input'),
            myId: document.getElementById('my-id-display'),
            targetId: document.getElementById('target-id'),
            connectBtn: document.getElementById('connect-btn'),
            chat: document.getElementById('chat-window'),
            form: document.getElementById('chat-form'),
            input: document.getElementById('chat-input'),
            peerList: document.getElementById('peer-list'),
            statusLight: document.getElementById('status-light'),
            statusText: document.getElementById('status-text'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            radar: document.getElementById('radar-container'),
            headerName: document.getElementById('header-name')
        };

        function notify(msg) {
            els.toastMsg.innerText = msg;
            els.toast.classList.add('visible');
            setTimeout(() => els.toast.classList.remove('visible'), 3000);
        }

        function setupConnection(conn) {
            if (connections.has(conn.peer)) return;

            conn.on('open', () => {
                connections.set(conn.peer, conn);
                updateUI();
                conn.send({ type: 'handshake', name: myName });
                
                // Heartbeat to keep NAT alive
                const heartbeat = setInterval(() => {
                    if (conn.open) conn.send({ type: 'ping' });
                    else clearInterval(heartbeat);
                }, 15000);

                notify("Connection Established!");
            });

            conn.on('data', (data) => {
                if (data.type === 'ping') return; // Silent ping
                if (data.type === 'handshake') {
                    conn.peerName = data.name;
                    updateUI();
                } else {
                    addMessage(conn.peerName || "Peer", data, "them");
                }
            });

            conn.on('close', () => {
                connections.delete(conn.peer);
                updateUI();
                notify("Peer disconnected");
            });
        }

        function addMessage(sender, text, type) {
            els.radar.style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex flex-col ${type === 'me' ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[8px] font-bold text-slate-400 uppercase px-2">${sender}</span>
                <div class="bubble ${type === 'me' ? 'bubble-me' : 'bubble-them'}">${text.replace(/</g, "&lt;")}</div>
            `;
            els.chat.appendChild(div);
            els.chat.scrollTop = els.chat.scrollHeight;
        }

        function updateUI() {
            let html = '';
            connections.forEach(c => {
                html += `<div class="p-3 bg-slate-50 border rounded-xl text-xs font-bold mb-2 flex items-center justify-between">
                    <span>${c.peerName || 'Connecting...'}</span>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                </div>`;
            });
            els.peerList.innerHTML = html;
            
            if (connections.size > 0) {
                els.statusLight.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                els.statusText.innerText = `${connections.size} Peer(s) Live`;
            }
        }

        els.startBtn.onclick = () => {
            const name = els.nameIn.value.trim();
            if (!name) return alert("Name please!");
            myName = name;
            els.headerName.innerText = name;
            els.landing.style.display = 'none';

            peer = new Peer(undefined, {
                config: {
                    'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:stun1.l.google.com:19302' },
                        { url: 'stun:stun2.l.google.com:19302' },
                        { url: 'stun:stun3.l.google.com:19302' },
                        { url: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => { els.myId.innerText = id; notify("P2P Engine Active"); els.statusText.innerText = "Online - Awaiting Peer"; });
            peer.on('connection', setupConnection);
        };

        els.connectBtn.onclick = () => {
            const target = els.targetId.value.trim();
            if (target && peer) setupConnection(peer.connect(target));
            els.targetId.value = '';
        };

        els.form.onsubmit = (e) => {
            e.preventDefault();
            const msg = els.input.value.trim();
            if (!msg) return;
            connections.forEach(c => c.open && c.send(msg));
            addMessage(myName, msg, "me");
            els.input.value = '';
        };

        document.getElementById('copy-id').onclick = () => {
            navigator.clipboard.writeText(els.myId.innerText);
            notify("ID Copied to Clipboard");
        };
    </script>
</body>
</html>
