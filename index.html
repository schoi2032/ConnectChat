<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | Room Edition</title>
    <!-- Standard script imports -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #eff6ff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #93c5fd;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">

    <!-- Auth / Login Screen -->
    <div id="auth-screen" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 animate-fade-in m-4 z-50 border border-blue-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-3xl mb-4 shadow-xl shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">ConnectChat</h1>
            <p class="text-blue-500 font-medium mt-2">Private P2P Rooms</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-blue-900 mb-1.5 ml-1">Your Name</label>
                <input type="text" id="username" placeholder="Who are you?" class="w-full px-5 py-4 rounded-2xl border-2 border-blue-50 focus:border-blue-500 outline-none transition-all bg-blue-50/50 text-blue-900 placeholder-blue-300">
            </div>
            <div>
                <label class="block text-sm font-bold text-blue-900 mb-1.5 ml-1">Room Name</label>
                <input type="text" id="room-name" placeholder="e.g. gamers-club" class="w-full px-5 py-4 rounded-2xl border-2 border-blue-50 focus:border-blue-500 outline-none transition-all bg-blue-50/50 text-blue-900 placeholder-blue-300 font-mono">
                <p class="text-[10px] text-blue-400 mt-2 ml-1">Enter a shared room name with friends.</p>
            </div>
            <button onclick="initSession()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98] shadow-lg shadow-blue-200 mt-4">
                Join Room
            </button>
        </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="chat-screen" class="hidden w-screen h-screen bg-white flex flex-col overflow-hidden animate-fade-in">
        <!-- Header -->
        <div class="bg-blue-600 p-4 md:px-6 text-white flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-lg z-20">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-500/50 rounded-xl flex items-center justify-center border border-white/20 backdrop-blur-sm">
                    <span id="user-initial" class="text-lg font-bold">?</span>
                </div>
                <div>
                    <h2 id="display-name" class="font-bold text-base leading-tight">...</h2>
                    <p class="text-blue-100 text-[9px] flex items-center gap-1.5 uppercase tracking-widest font-bold">
                        <span id="status-indicator" class="w-2 h-2 bg-yellow-400 rounded-full status-pulse"></span>
                        <span id="status-text">Booting...</span>
                        <span class="mx-1 opacity-40">|</span>
                        ROOM: <span id="my-room-display" class="font-mono bg-blue-800/50 px-2 py-0.5 rounded">...</span>
                    </p>
                </div>
            </div>
            
            <!-- Connection Control -->
            <div class="flex items-center gap-2">
                <div class="relative flex-grow">
                    <input type="text" id="target-peer-id" placeholder="Paste friend's Internal ID..." class="w-full md:w-64 bg-blue-700/50 border border-blue-400/30 rounded-xl px-4 py-2 text-xs placeholder-blue-300 outline-none focus:bg-blue-800 transition-all text-white font-mono">
                </div>
                <button onclick="connectToPeer()" class="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-blue-50 transition-all shadow-md active:scale-95 whitespace-nowrap">
                    Connect
                </button>
            </div>

            <div class="flex items-center gap-2 border-l border-blue-500 pl-4">
                <div class="text-right">
                    <p class="text-[8px] text-blue-200 font-bold uppercase">My Internal ID:</p>
                    <p id="my-internal-id" class="text-[10px] font-mono text-white select-all cursor-pointer bg-blue-800/30 px-2 py-1 rounded">...</p>
                </div>
                <button onclick="copyMyId()" class="bg-blue-500/50 p-2 rounded-lg hover:bg-blue-500 transition-all border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex flex-grow overflow-hidden bg-blue-50/30">
            <!-- Sidebar -->
            <div class="hidden md:flex flex-col w-64 bg-white border-r border-blue-100 overflow-y-auto custom-scrollbar">
                <div class="p-4 border-b border-blue-50 bg-white/80 backdrop-blur-md sticky top-0 z-10">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] flex items-center justify-between">
                        Connected
                        <span id="contact-count" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-[9px]">1</span>
                    </h3>
                </div>
                <div id="contacts-list" class="p-2 space-y-1">
                    <div class="flex items-center gap-3 p-3 bg-blue-50 rounded-xl border border-blue-200">
                        <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-black text-xs">You</div>
                        <p id="self-name-list" class="text-xs font-bold text-blue-900 truncate">...</p>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="flex flex-col flex-grow bg-white relative">
                <div id="messages-container" class="flex-grow p-4 md:p-6 overflow-y-auto custom-scrollbar space-y-4">
                    <div id="welcome-message" class="max-w-md mx-auto text-center py-20 animate-fade-in">
                        <div class="bg-blue-50 text-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-black text-blue-900">Room Ready</h3>
                        <p class="text-xs text-blue-500 mt-2 px-6">1. Copy your <b>Internal ID</b>.<br>2. Send it to a friend.<br>3. They paste it in the box above and click <b>Connect</b>.</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-4 bg-white border-t border-blue-50">
                    <div class="max-w-4xl mx-auto">
                        <form id="chat-form" onsubmit="sendMessage(event)" class="flex gap-2">
                            <input type="text" id="message-input" placeholder="Type a message..." class="flex-grow px-5 py-3 bg-blue-50/50 rounded-xl border border-transparent focus:border-blue-600 focus:bg-white outline-none transition-all text-sm text-blue-900" autocomplete="off">
                            <button type="submit" class="bg-blue-600 text-white px-6 rounded-xl hover:bg-blue-700 transition-all transform active:scale-95 shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        let peer;
        let connections = {}; 
        let peerNames = {}; 
        let userData = { name: '', room: '', internalId: '' };
        let hasMessages = false;

        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const messagesContainer = document.getElementById('messages-container');
        const contactsList = document.getElementById('contacts-list');
        const welcomeMessage = document.getElementById('welcome-message');

        function initSession() {
            userData.name = document.getElementById('username').value.trim();
            const rawRoom = document.getElementById('room-name').value.trim().toLowerCase().replace(/\s+/g, '-');
            
            if (!userData.name || !rawRoom) {
                alert("Please enter your name and a room name!");
                return;
            }

            userData.room = rawRoom;
            // PeerJS ID must be alphanumeric/dashes/underscores
            userData.internalId = `cc-${userData.room}-${Math.random().toString(36).substr(2, 6)}`;
            createPeer();
        }

        function createPeer() {
            peer = new Peer(userData.internalId, {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                updateUIStatus(true);
                authScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                
                document.getElementById('display-name').innerText = userData.name;
                document.getElementById('self-name-list').innerText = userData.name;
                document.getElementById('my-room-display').innerText = userData.room;
                document.getElementById('my-internal-id').innerText = id;
                document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
                
                startHeartbeat();
            });

            peer.on('connection', handleConnection);

            peer.on('error', (err) => {
                console.error("Peer Error:", err.type);
                if (err.type === 'peer-unavailable') {
                    alert("Could not find that person. Make sure they are online and their ID is correct!");
                }
            });

            peer.on('disconnected', () => {
                updateUIStatus(false);
                peer.reconnect();
            });
        }

        function copyMyId() {
            const id = userData.internalId;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = id;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            
            const btn = event.currentTarget;
            const originalColor = btn.style.backgroundColor;
            btn.style.backgroundColor = "#10b981"; // Green
            setTimeout(() => btn.style.backgroundColor = originalColor, 1000);
        }

        function updateUIStatus(online) {
            const indicator = document.getElementById('status-indicator');
            const statusTxt = document.getElementById('status-text');
            if (online) {
                indicator.className = "w-2 h-2 bg-green-400 rounded-full shadow-[0_0_8px_rgba(74,222,128,0.6)]";
                statusTxt.innerText = "Network Active";
            } else {
                indicator.className = "w-2 h-2 bg-red-400 rounded-full status-pulse";
                statusTxt.innerText = "Connecting...";
            }
        }

        function connectToPeer() {
            const targetId = document.getElementById('target-peer-id').value.trim();
            if (!targetId || targetId === userData.internalId || connections[targetId]) return;
            
            const conn = peer.connect(targetId, { reliable: true });
            handleConnection(conn);
            document.getElementById('target-peer-id').value = '';
        }

        function handleConnection(conn) {
            conn.on('open', () => {
                if (!connections[conn.peer]) {
                    connections[conn.peer] = conn;
                    
                    // Send identification + current mesh info
                    setTimeout(() => {
                        const known = Object.keys(connections).filter(id => id !== conn.peer);
                        conn.send({
                            type: 'handshake',
                            name: userData.name,
                            knownPeers: known
                        });
                    }, 500);
                    
                    updateContactsUI();
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    if (!hasMessages) hideWelcome();
                    renderMessage(data.sender, data.text, false);
                    document.getElementById('notif-sound').play().catch(()=>{});
                } else if (data.type === 'handshake') {
                    peerNames[conn.peer] = data.name;
                    updateContactsUI();
                    
                    // Mesh bridging
                    if (data.knownPeers) {
                        data.knownPeers.forEach(id => {
                            if (id !== userData.internalId && !connections[id]) {
                                connectToPeerManually(id);
                            }
                        });
                    }
                }
            });

            const disconnect = () => {
                delete connections[conn.peer];
                delete peerNames[conn.peer];
                updateContactsUI();
            };

            conn.on('close', disconnect);
            conn.on('error', disconnect);
        }

        function connectToPeerManually(id) {
            const conn = peer.connect(id, { reliable: true });
            handleConnection(conn);
        }

        function startHeartbeat() {
            setInterval(() => {
                if (peer.disconnected && !peer.destroyed) peer.reconnect();
                Object.values(connections).forEach(c => {
                    if (c.open) c.send({ type: 'hb' });
                });
            }, 5000);
        }

        function updateContactsUI() {
            const list = Object.keys(connections);
            document.getElementById('contact-count').innerText = list.length + 1;
            
            contactsList.innerHTML = `
                <div class="flex items-center gap-3 p-3 bg-blue-50 rounded-xl border border-blue-200">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-black text-xs">You</div>
                    <p class="text-xs font-bold text-blue-900 truncate">${userData.name}</p>
                </div>
            `;

            list.forEach(id => {
                const name = peerNames[id] || 'Connecting...';
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 bg-white rounded-xl border border-blue-100 shadow-sm animate-fade-in";
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center font-black text-xs">
                        ${name.charAt(0).toUpperCase()}
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-xs font-bold text-blue-900 truncate">${name}</p>
                        <p class="text-[7px] font-mono text-blue-300 truncate tracking-tighter">${id}</p>
                    </div>
                `;
                contactsList.appendChild(div);
            });
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            if (!hasMessages) hideWelcome();

            const payload = { type: 'chat', sender: userData.name, text: text };
            Object.values(connections).forEach(c => {
                if (c.open) c.send(payload);
            });

            renderMessage('You', text, true);
            input.value = '';
        }

        function hideWelcome() {
            hasMessages = true;
            welcomeMessage.classList.add('hidden');
        }

        function renderMessage(sender, text, isMe) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-1 w-full`;
            
            msgDiv.innerHTML = `
                <span class="text-[9px] font-black uppercase tracking-widest text-blue-400 px-2">${sender}</span>
                <div class="message-bubble px-5 py-3 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-100 text-blue-900 rounded-tl-none border border-blue-50'}">
                    <p class="text-sm font-medium">${escapeHTML(text)}</p>
                </div>
                <span class="text-[8px] text-blue-300 px-2 font-bold opacity-70">${time}</span>
            `;

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
