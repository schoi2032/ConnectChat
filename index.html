<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat - P2P Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .bubble-me {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble-them {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: slideUp 0.25s ease-out forwards; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Login/Landing -->
    <div id="landing-page" class="fixed inset-0 z-50 flex items-center justify-center bg-white p-6">
        <div class="max-w-sm w-full text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-xl shadow-blue-100">
                <i class="fas fa-comments"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">ConnectChat</h1>
            <p class="text-slate-500 mb-8 font-medium">Safe, private group & direct chat.</p>
            
            <input type="text" id="name-input" placeholder="Your nickname..." maxlength="15"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold">
            
            <button id="enter-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                Start Chatting
            </button>
            <p class="mt-6 text-[10px] uppercase tracking-widest text-slate-400 font-bold">No servers. Just you and your friends.</p>
        </div>
    </div>

    <!-- Header -->
    <header class="h-20 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-100">
                <i class="fas fa-users"></i>
            </div>
            <div>
                <h2 class="font-bold text-slate-900 leading-none">ConnectChat</h2>
                <div class="flex items-center gap-1.5 mt-1">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span id="user-name-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Offline</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="bg-slate-100 border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase">My Link ID:</span>
                <code id="my-id-text" class="text-xs font-bold text-blue-600 font-mono">...</code>
                <button id="copy-btn" class="text-slate-400 hover:text-blue-600 transition-colors">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col p-6 shrink-0">
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 block">Add to Group</label>
            <div class="space-y-2 mb-8">
                <input type="text" id="peer-id-input" placeholder="Paste Friend's ID" 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button id="connect-btn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm hover:bg-black transition-all active:scale-95">
                    Connect Friend
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Participants</span>
                    <span id="member-count" class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-full">1</span>
                </div>
                <div id="conn-list" class="space-y-2">
                    <div class="p-3 bg-blue-50/50 rounded-xl border border-blue-100 flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xs font-bold">You</div>
                        <span id="sidebar-my-name" class="text-sm font-semibold text-slate-700 truncate">Me</span>
                    </div>
                    <!-- Other friends appear here -->
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-100 text-[10px] text-slate-400 leading-relaxed font-medium">
                <i class="fas fa-shield-alt mr-1"></i> Safety Tip: Only connect with people you know in real life!
            </div>
        </aside>

        <!-- Chat View -->
        <section class="flex-1 flex flex-col bg-slate-50 relative">
            <div id="msg-container" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center py-20">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-slate-200 text-4xl mb-4 shadow-sm">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                    <p class="font-bold text-slate-900">Start the conversation</p>
                    <p class="text-xs text-slate-400 mt-1 max-w-[200px]">Link with a friend to begin your secure group or private chat.</p>
                </div>
            </div>

            <footer class="p-4 md:p-6 bg-white border-t border-slate-200">
                <form id="chat-form" class="max-w-4xl mx-auto flex items-center gap-3">
                    <div class="flex-1 relative">
                        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off"
                            class="w-full bg-slate-100 border-none rounded-2xl px-6 py-4 font-medium focus:ring-2 focus:ring-blue-500 outline-none transition-all pr-12">
                    </div>
                    <button type="submit" class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                        <i class="fas fa-location-arrow text-xl"></i>
                    </button>
                </form>
            </footer>
        </section>
    </main>

    <script>
        let peer = null;
        let connections = []; // Array to handle group chat
        let myName = "User";

        const landing = document.getElementById('landing-page');
        const nameInput = document.getElementById('name-input');
        const startBtn = document.getElementById('enter-btn');
        const myIdText = document.getElementById('my-id-text');
        const msgContainer = document.getElementById('msg-container');
        const connList = document.getElementById('conn-list');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const emptyState = document.getElementById('empty-state');

        startBtn.onclick = () => {
            const name = nameInput.value.trim();
            if (name.length < 2) {
                alert("Please enter a longer nickname!");
                return;
            }
            myName = name;
            document.getElementById('user-name-display').innerText = name;
            document.getElementById('sidebar-my-name').innerText = name;
            landing.style.display = 'none';
            initPeer();
        };

        function initPeer() {
            peer = new Peer();

            peer.on('open', (id) => {
                myIdText.innerText = id;
            });

            // When someone connects to YOU
            peer.on('connection', (conn) => {
                setupConn(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'peer-disconnected') return;
                addMessage("System", `Connection issue: ${err.type}`, "sys");
            });
        }

        // Connect to a friend manually
        document.getElementById('connect-btn').onclick = () => {
            const id = document.getElementById('peer-id-input').value.trim();
            if (!id || id === peer.id) return;
            
            // Check if already connected
            if (connections.find(c => c.peer === id)) {
                alert("Already connected to this ID!");
                return;
            }

            const conn = peer.connect(id, {
                metadata: { name: myName }
            });
            setupConn(conn);
            document.getElementById('peer-id-input').value = '';
        };

        function setupConn(conn) {
            conn.on('open', () => {
                connections.push(conn);
                emptyState.style.display = 'none';
                updateSidebar();
                addMessage("System", `${conn.metadata?.name || 'A friend'} joined the chat.`, "sys");
            });

            conn.on('data', (data) => {
                // If we receive data, display it
                addMessage(conn.metadata?.name || "Friend", data, "them");
            });

            conn.on('close', () => {
                connections = connections.filter(c => c.peer !== conn.peer);
                updateSidebar();
                addMessage("System", "Someone left the chat.", "sys");
                if (connections.length === 0) emptyState.style.display = 'flex';
            });
        }

        function updateSidebar() {
            const listContainer = document.getElementById('conn-list');
            // Keep "You" in the list
            let html = `
                <div class="p-3 bg-blue-50/50 rounded-xl border border-blue-100 flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xs font-bold">You</div>
                    <span class="text-sm font-semibold text-slate-700 truncate">${myName}</span>
                </div>
            `;
            
            connections.forEach(c => {
                html += `
                    <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-between message-anim">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-8 h-8 bg-slate-200 rounded-lg flex items-center justify-center text-slate-500 text-xs">
                                <i class="fas fa-user"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-700 truncate">${c.metadata?.name || 'Friend'}</span>
                        </div>
                        <div class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_5px_#10b981]"></div>
                    </div>
                `;
            });
            
            listContainer.innerHTML = html;
            document.getElementById('member-count').innerText = connections.length + 1;
        }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;
            
            if (connections.length === 0) {
                addMessage("System", "Connect with a friend's ID first!", "sys");
                return;
            }

            // Send to everyone connected (Broadcast Group Chat)
            connections.forEach(conn => {
                if (conn.open) conn.send(text);
            });

            addMessage(myName, text, "me");
            chatInput.value = '';
        };

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            if (type === 'sys') {
                div.className = "flex justify-center my-4";
                div.innerHTML = `<span class="bg-slate-200/60 text-slate-500 text-[10px] font-bold uppercase px-3 py-1 rounded-full tracking-wider">${text}</span>`;
            } else {
                const isMe = type === 'me';
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} message-anim mb-1`;
                div.innerHTML = `
                    <span class="text-[9px] font-bold text-slate-400 uppercase mb-1 px-2">${sender}</span>
                    <div class="max-w-[80%] px-4 py-2.5 rounded-2xl text-sm font-medium shadow-sm ${isMe ? 'bubble-me' : 'bubble-them'}">
                        ${escapeHTML(text)}
                    </div>
                `;
            }
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
            if (type !== 'sys') emptyState.style.display = 'none';
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        document.getElementById('copy-btn').onclick = () => {
            const id = myIdText.innerText;
            if (id === "...") return;
            
            const area = document.createElement('textarea');
            area.value = id;
            document.body.appendChild(area);
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
            
            const original = myIdText.innerText;
            myIdText.innerText = "COPIED!";
            myIdText.classList.replace('text-blue-600', 'text-emerald-600');
            setTimeout(() => {
                myIdText.innerText = original;
                myIdText.classList.replace('text-emerald-600', 'text-blue-600');
            }, 1500);
        };
    </script>
</body>
</html>
