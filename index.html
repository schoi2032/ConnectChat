<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupMerge Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div id="app" class="flex flex-col h-full">
        <!-- Header -->
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm shrink-0">
            <div class="flex items-center gap-2 text-indigo-600">
                <i data-lucide="message-square" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight">GroupMerge Chat</h1>
            </div>
            <div class="bg-indigo-50 px-3 py-1 rounded-full flex items-center gap-2 text-indigo-700 text-sm font-medium border border-indigo-100">
                <i data-lucide="users" class="w-4 h-4"></i>
                <span id="memberCount">0 Online</span>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-full md:w-80 bg-white border-r flex flex-col p-4 gap-6 overflow-y-auto shrink-0">
                <section class="space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Your Identity</h2>
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-100 space-y-2">
                        <div class="flex items-center gap-2">
                            <div id="userAvatar" class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-xs">?</div>
                            <span id="userIdDisplay" class="text-sm font-mono text-slate-600 truncate flex-1 italic">Connecting...</span>
                        </div>
                        <button id="copyBtn" class="w-full flex items-center justify-center gap-2 text-xs py-1.5 bg-white border rounded hover:bg-slate-50 transition-colors">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            <span>Copy My ID</span>
                        </button>
                    </div>
                </section>

                <section class="space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Join Others</h2>
                    <div class="space-y-2">
                        <input id="joinInput" type="text" placeholder="Paste User ID here..." class="w-full p-2.5 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-slate-50">
                        <button id="joinBtn" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm">
                            Connect Everyone
                        </button>
                        <p class="text-[10px] text-slate-400 leading-tight">
                            * Connecting merges your entire group with theirs.
                        </p>
                    </div>
                </section>

                <section class="flex-1 space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Group Members</h2>
                    <div id="membersList" class="space-y-1"></div>
                </section>
            </aside>

            <!-- Chat Area -->
            <section class="flex-1 flex flex-col bg-slate-100/50 relative overflow-hidden">
                <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 space-y-2">
                        <i data-lucide="message-square" class="w-12 h-12 opacity-20"></i>
                        <p>Loading messages...</p>
                    </div>
                </div>

                <form id="chatForm" class="p-4 bg-white border-t flex gap-2 shrink-0">
                    <input id="msgInput" type="text" class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="Type a message...">
                    <button type="submit" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </section>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, updateDoc, getDocs, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global state
        let currentUser = null;
        let currentGroupId = null;
        let msgUnsubscribe = null;
        let membersUnsubscribe = null;

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'group-merge-chat-v1';

        // UI Selectors
        const userIdDisplay = document.getElementById('userIdDisplay');
        const userAvatar = document.getElementById('userAvatar');
        const copyBtn = document.getElementById('copyBtn');
        const joinInput = document.getElementById('joinInput');
        const joinBtn = document.getElementById('joinBtn');
        const membersList = document.getElementById('membersList');
        const memberCount = document.getElementById('memberCount');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');

        // Initialization
        window.onload = async () => {
            lucide.createIcons();
            
            // Auth Flow (Rule 3)
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupUser();
            }
        });

        async function setupUser() {
            userIdDisplay.textContent = currentUser.uid;
            userAvatar.textContent = currentUser.uid.substring(0, 2).toUpperCase();
            
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid);
            await setDoc(userRef, {
                uid: currentUser.uid,
                groupId: currentGroupId || currentUser.uid,
                lastActive: serverTimestamp()
            }, { merge: true });

            // Listen for changes to current user (specifically their groupId)
            onSnapshot(userRef, (snap) => {
                const data = snap.data();
                if (data && data.groupId !== currentGroupId) {
                    currentGroupId = data.groupId;
                    syncGroup();
                }
            });
        }

        function syncGroup() {
            if (msgUnsubscribe) msgUnsubscribe();
            if (membersUnsubscribe) membersUnsubscribe();

            // 1. Sync Messages (Rule 2: Fetch all in collection, we use a simple orderBy)
            const msgQuery = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'groups', currentGroupId, 'messages'),
                orderBy('timestamp', 'asc')
            );
            
            msgUnsubscribe = onSnapshot(msgQuery, (snapshot) => {
                renderMessages(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
            }, (err) => console.error("Msg sync err:", err));

            // 2. Sync Members (Rule 2: Simple collection listen, filter in JS)
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            membersUnsubscribe = onSnapshot(usersRef, (snapshot) => {
                const allUsers = snapshot.docs.map(d => d.data());
                const filtered = allUsers.filter(u => u.groupId === currentGroupId);
                renderMembers(filtered);
            }, (err) => console.error("Member sync err:", err));
        }

        // --- Render Logic ---

        function renderMessages(msgs) {
            if (msgs.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 space-y-2">
                        <i data-lucide="message-square" class="w-12 h-12 opacity-20"></i>
                        <p>No messages yet. Send a hello!</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            messagesContainer.innerHTML = msgs.map(msg => {
                const isMe = msg.senderId === currentUser.uid;
                const isSystem = msg.senderId === 'system';

                if (isSystem) {
                    return `
                        <div class="flex justify-center">
                            <span class="bg-slate-200 text-slate-600 px-3 py-1 rounded-full text-[10px] uppercase font-bold tracking-widest">
                                ${msg.text}
                            </span>
                        </div>`;
                }

                return `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <div class="max-w-[75%] ${isMe ? 'bg-indigo-600 text-white' : 'bg-white text-slate-800'} p-3 rounded-2xl shadow-sm border ${isMe ? 'border-indigo-500' : 'border-slate-200'}">
                            ${!isMe ? `<p class="text-[10px] font-bold opacity-70 mb-1">USER-${msg.senderId.substring(0, 4)}</p>` : ''}
                            <p class="text-sm leading-relaxed">${msg.text}</p>
                        </div>
                    </div>`;
            }).join('');
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderMembers(members) {
            memberCount.textContent = `${members.length} Online`;
            membersList.innerHTML = members.map(m => `
                <div class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-md transition-colors">
                    <div class="w-2 h-2 rounded-full ${m.uid === currentUser.uid ? 'bg-green-500' : 'bg-slate-300'}"></div>
                    <span class="text-sm text-slate-700 font-medium truncate">
                        ${m.uid === currentUser.uid ? 'You' : `User-${m.uid.substring(0, 4)}`}
                    </span>
                </div>
            `).join('');
        }

        // --- Event Handlers ---

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text || !currentUser || !currentGroupId) return;

            msgInput.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'groups', currentGroupId, 'messages'), {
                text,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
        };

        joinBtn.onclick = async () => {
            const targetId = joinInput.value.trim();
            if (!targetId || targetId === currentUser.uid) return;

            joinBtn.disabled = true;
            joinBtn.textContent = 'Connecting...';

            try {
                // 1. Get target's group
                const targetRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', targetId);
                const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
                const targetData = usersSnap.docs.find(d => d.id === targetId)?.data();

                if (!targetData) {
                    showStatus('User ID not found!', 'bg-red-100 text-red-600');
                    return;
                }

                const newGroupId = targetData.groupId;
                const oldGroupId = currentGroupId;

                if (newGroupId === oldGroupId) {
                    showStatus('Already in same group!', 'bg-amber-100 text-amber-600');
                    return;
                }

                // 2. Identify everyone in MY group to merge them all
                const usersToMove = usersSnap.docs
                    .map(d => d.data())
                    .filter(u => u.groupId === oldGroupId);

                // 3. Move everyone (Rule 1: Strict paths)
                const updates = usersToMove.map(u => 
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), {
                        groupId: newGroupId
                    })
                );
                await Promise.all(updates);

                // 4. Send system announcement
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'groups', newGroupId, 'messages'), {
                    text: `A group of ${usersToMove.length} joined the chat`,
                    senderId: 'system',
                    timestamp: serverTimestamp()
                });

                joinInput.value = '';
                showStatus('Successfully Merged!', 'bg-green-100 text-green-600');
            } catch (err) {
                console.error("Merge error:", err);
            } finally {
                joinBtn.disabled = false;
                joinBtn.textContent = 'Connect Everyone';
            }
        };

        copyBtn.onclick = () => {
            const text = currentUser.uid;
            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-green-500"></i><span>Copied!</span>`;
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        };

        function showStatus(msg, classes) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 animate-bounce ${classes}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
